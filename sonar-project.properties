# Must match SonarCloud exactly: Project → Administration → Update Key / About.
# Typical GitHub import pattern: {organization_key}_{repository_slug}
sonar.host.url=https://sonarcloud.io
sonar.organization=coderrony
sonar.projectKey=coderrony_improving-quality
sonar.projectName=14 Improving Quality - Todo Frontend

sonar.links.scm=https://github.com/coderrony/improving-quality.git
sonar.links.ci=https://github.com/coderrony/improving-quality/actions

sonar.sources=react-frontend/src
sonar.tests=react-frontend/src
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=react-frontend/coverage/lcov.info
